name: June12 Automation

on:
  

  workflow_dispatch:

jobs:

  run-script:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create ENV File
        run: |
          echo "SERVER_API_TOKEN=${{ secrets.SERVER_API_TOKEN_12 }}" >> .env.12june
          echo "SENDER_EMAIL=${{ secrets.SENDER_EMAIL_12 }}" >> .env.12june
          echo "ACCOUNT_ID=${{ secrets.ACCOUNT_ID_12 }}" >> .env.12june
          echo "CLIENT_ID=${{ secrets.CLIENT_ID_12 }}" >> .env.12june
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET_12 }}" >> .env.12june
          echo "ZOOM_MEETING_ID=${{ secrets.ZOOM_MEETING_ID_12 }}" >> .env.12june

      - name: Run Automation
        run: python automation_12june.py
