name: Event Day Automation

on:
  

  workflow_dispatch:

jobs:
  run-event-day:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests postmarker python-dotenv pandas

      - name: Run script
        env:
          SERVER_API_TOKEN: ${{ secrets.SERVER_API_TOKEN_12 }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL_12 }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID_12 }}
          CLIENT_ID: ${{ secrets.CLIENT_ID_12 }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET_12 }}
          ZOOM_MEETING_ID: ${{ secrets.ZOOM_MEETING_ID_12 }}
        run: |
          python event_day.py
